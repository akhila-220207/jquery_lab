<!DOCTYPE html>
<html>
<head>
  <title>jQuery Lab</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- attr() -->
<img id="myimg" src="image1.jpg" width="150">
<button id="changeimg">change image</button>

<!-- removeatrr -->
<input type="text" id="inputbox" disabled>
<button id="enablebtn">enable</button>

<!-- prop() -->
 <input type="checkbox" id="checkbox">
 <button id="disable">disable</button>
 <button id="enable">enable</button>


 
</body>
<script>
$("#changeimg").click(function(){
  $("#myimg").attr("src","image2.jpg")
});

$("#enablebtn").click(function(){
  $("#inputbox").removeAttr("disabled")
})

$("#disable").click(function(){
  $("#checkbox").prop("disabled",true)
})
$("#disable").click(function(){
  $("#checkbox").prop("disabled",false)
})

</script>
</html>
